version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18

    commands:
      # install npm
      - npm install

  build:
    commands:
      # run build script
      - npm run build

artifacts:
  # include all files required to run the application
  files:
    - dist/**/*
